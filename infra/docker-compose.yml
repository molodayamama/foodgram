version: '3.3'

services:

  db:
    container_name: foodgram-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-foodgram}
      POSTGRES_USER: ${POSTGRES_USER:-foodgram}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodgram}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: unless-stopped

  backend:
    container_name: foodgram-backend
    image: temastrrrrrrr/foodgram-backend:latest
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost 127.0.0.1}
      POSTGRES_DB: ${POSTGRES_DB:-foodgram}
      POSTGRES_USER: ${POSTGRES_USER:-foodgram}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodgram}
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - static_value:/app/static/
      - media_value:/app/media/
      - ../data/:/app/data/
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    container_name: foodgram-front
    build: ../frontend
    volumes:
      - ../frontend/:/app/result_build/

  nginx:
    container_name: foodgram-proxy
    image: nginx:1.25.4-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ../frontend/build:/usr/share/nginx/html/
      - ../docs/:/usr/share/nginx/html/api/docs/
      - static_value:/var/html/static/
      - media_value:/var/html/media/
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  static_value:
  media_value:
